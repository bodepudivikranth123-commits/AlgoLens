<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AlgoLens | Quiz</title>

    <link rel="stylesheet" href="../css/quiz.css">

</head>

<body>
    <header>
     <nav class="navbar">

        <div class="logo">
              
            <a href="../index.html">

            <img src="../assets/logos/AlgoLens_logo.png" alt="AlgoLens Logo">

        </div>

        <ul class="nav-links">

            <li><a href="../pages/dashboard.html">Algorithms</a></li>

            <li><a href="../pages/compare.html" >Compare</a></li>

            <li><a href="../pages/notes.html">Notes</a></li>

            <li><a href="../pages/quiz.html" class="active">Quiz</a></li>

        </ul>

    </nav>
    </header>

<div class="container">

    <div id="startScreen">

        <h1>DSA Quiz</h1>

        <p>Test your understanding of Data Structures and Algorithms.</p>

        <div class="controls">

            <select id="category">

                <option value="All">All Categories</option>
                <option value="Sorting">Sorting</option>
                <option value="Searching">Searching</option>
                <option value="Trees">Trees</option>
                <option value="Graphs">Graphs</option>
                <option value="Recursion">Recursion</option>

            </select>

            <select id="difficulty">

                <option value="All">All Difficulties</option>
                <option value="Easy">Easy</option>
                <option value="Medium">Medium</option>
                <option value="Hard">Hard</option>

            </select>

            <button id="startBtn">

                Start Quiz

            </button>

        </div>

    </div>

    <div id="quizScreen" style="display:none;">

        <div class="topBar">

            <span id="questionNumber"></span>

            <span id="score"></span>

        </div>

        <h2 id="question"></h2>

        <div id="options"></div>

        <div class="buttons">

            <button id="prevBtn">

                Previous

            </button>

            <button id="nextBtn">

                Next

            </button>

        </div>

    </div>

    <div id="resultScreen" style="display:none;">

        <h1>Quiz Completed 🎉</h1>

       <h2 id="finalScore"></h2>

         <p id="performance"></p>

        <div id="reviewAnswers"></div>

           <button onclick="location.reload()">
              Try Again
           </button>

    </div>

</div>

<script src="../js/questions.js"></script>

<script src="../js/quiz.js"></script>

</body>

</html>
