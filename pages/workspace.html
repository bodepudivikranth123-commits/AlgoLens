<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>AlgoLens Workspace</title>

    <link rel="stylesheet"
          href="../css/workspace.css">

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
          rel="stylesheet">

    <!-- Prism CSS -->
    <link href="https://cdn.jsdelivr.net/npm/prismjs/themes/prism.min.css"
          rel="stylesheet">

</head>

<body>

<header>

<nav class="navbar">

<div class="logo">

<a href="../index.html">

<img src="../assets/logos/AlgoLens_logo.png"
     alt="AlgoLens">

</a>

</div>

<ul class="nav-links">

<li><a href="dashboard.html">Algorithms</a></li>

<li><a href="compare.html">Compare</a></li>

<li><a href="notes.html">Notes</a></li>

<li><a href="quiz.html">Quiz</a></li>

</ul>

</nav>

</header>

<main>

<!-- Back -->

<section class="back-section">

<a href="dashboard.html">

← Back to Dashboard

</a>

</section>

<!-- ================= TOP SECTION ================= -->

<section class="top-section">

    <!-- Algorithm Details -->

    <div class="algorithm-info">

        <h1 id="algorithmName"></h1>

        <div class="info-grid">

            <div>

                <strong>Difficulty</strong>

                <p id="difficulty"></p>

            </div>

            <div>

                <strong>Time Complexity</strong>

                <p id="timeComplexity"></p>

            </div>

            <div>

                <strong>Space Complexity</strong>

                <p id="spaceComplexity"></p>

            </div>

        </div>

    </div>

    <!-- Input -->

    <div class="input-section">

        <h2>Input Array</h2>

        <div class="input-container">

            <input
                type="text"
                id="arrayInput"
                placeholder="Example : 5,3,8,1,6">

            <button id="randomBtn">

                Random

            </button>

            <button id="exampleBtn">

                Example

            </button>
        
        </div>
<div id="targetContainer" class="target-container" style="display:none;">

    <label>Target</label>

    <input
        type="number"
        id="targetInput"
        readonly
        placeholder="Select target">

    <button id="targetBtn">

        Pick Target

    </button>

</div>
    </div>

</section>

<!-- ================= CODE ================= -->

<section class="code-section">

<div class="code-header">

<h2>Code</h2>

<div class="tabs">

<button
class="tab-btn active"
data-tab="cpp">

C++

</button>

<button
class="tab-btn"
data-tab="pseudo">

Pseudo Code

</button>

</div>

</div>

<pre><code
id="codeArea"
class="language-cpp"></code></pre>

</section>

<!-- ================= VISUALIZATION ================= -->

<section class="visualization-section">

<h2>Visualization</h2>

<div class="visualizer-wrapper">

    <div id="visualizer"></div>

</div>
</section>

<!-- ================= CONTROLS ================= -->

<section class="controls">

<button id="playBtn">

▶ Play

</button>

<button id="pauseBtn">

⏸ Pause

</button>

<button id="previousBtn">

⏪ Previous

</button>

<button id="nextBtn">

⏩ Next

</button>

<button id="resetBtn">

↺ Reset

</button>

</section>

<!-- ================= SPEED ================= -->

<section class="speed-section">

<label>

Animation Speed

</label>

<input
type="range"
id="speedSlider"
min="1"
max="4"
value="2">

</section>

<!-- ================= VARIABLES & EXPLANATION ================= -->

<section class="bottom-panels">

<div class="panel">

<h3>

Variables

</h3>

<div id="variables">

</div>

</div>

<div class="panel">

<h3>

Explanation

</h3>

<p id="explanation"></p>

</div>

</section>

</main>

<footer>

<div class="footer-content">

<h2>AlgoLens</h2>

<p>

Visualize. Understand. Master Algorithms.

</p>

</div>

</footer>

<script src="https://cdn.jsdelivr.net/npm/prismjs/prism.js"></script>
<script src="../utils/graphGenerator.js"></script>
<script src="../js/workspace.js"></script>

</body>

</html>
