<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Dashboard | AlgoLens</title>

    <link rel="stylesheet" href="../css/dashboard.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
</head>

<body>

<header>

    <nav class="navbar">

        <div class="logo">

            <a href="../index.html">

                <img src="../assets/logos/AlgoLens_logo.png" alt="AlgoLens Logo">

            </a>

        </div>

        <ul class="nav-links">

            <li><a href="dashboard.html" class="active">Algorithms</a></li>

            <li><a href="compare.html">Compare</a></li>

            <li><a href="notes.html">Notes</a></li>

            <li><a href="quiz.html">Quiz</a></li>

        </ul>

    </nav>

</header>

<main>

    <!-- ================= WELCOME ================= -->

    <section class="welcome">

        <h1>Welcome 👋</h1>

        <p>

            Choose an algorithm and start visualizing its execution.

        </p>

    </section>

    <!-- ================= SEARCH ================= -->

    <section class="search-section">

        <input
            type="text"
            id="searchBox"
            placeholder="Search algorithms...">

    </section>

    <!-- ================= CATEGORY BAR ================= -->

    <section class="categories">

        <button class="category active" data-category="All">
            All
        </button>

        <button class="category" data-category="Sorting">
            Sorting
        </button>

        <button class="category" data-category="Searching">
            Searching
        </button>

        <button class="category" data-category="Trees">
            Trees
        </button>

        <button class="category" data-category="Graphs">
            Graphs
        </button>

        <button class="category" data-category="Recursion">
            Recursion
        </button>

    </section>

    <!-- ================= ALGORITHMS ================= -->

    <section class="algorithms">

        <h2>Algorithms</h2>

        <div id="algorithmGrid" class="algorithm-grid">

            <!-- Cards generated using dashboard.js -->

        </div>

    </section>

</main>

<footer>

    <div class="footer-content">

        <h2>AlgoLens</h2>

        <p>

            Visualize. Understand. Master Algorithms.

        </p>

    </div>

</footer>

<script src="../js/dashboard.js"></script>

</body>

</html>
